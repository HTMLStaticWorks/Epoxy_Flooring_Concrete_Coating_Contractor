<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | EpoxyPro Contractors</title>
  <meta name="description" content="Login to your EpoxyPro account to manage your flooring projects, quotes, and appointments." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css?v=2.1" />
</head>
<body>

<!-- Floating Theme & RTL Controls (Top Right Corner, Outside Card) -->
<div class="auth-controls" style="position:fixed;top:24px;right:24px;z-index:1001;display:flex;gap:10px;">
  <button class="header-icon-btn rtl-toggle" title="RTL Toggle" aria-label="Toggle RTL" style="color:#fff;">
    <i class="fas fa-align-right"></i>
  </button>
  <button class="header-icon-btn theme-toggle" title="Theme Toggle" aria-label="Toggle Theme" style="color:#fff;">
    <i class="theme-icon fas fa-moon"></i>
  </button>
</div>

<div class="auth-page">
  <div class="auth-card" data-aos="zoom-in">
    
    <!-- Centered Card Header (Logo + Brand Name) -->
    <div class="auth-header-wrap" style="display:flex;flex-direction:row;align-items:center;justify-content:center;gap:14px;margin-bottom:28px;">
      <a href="index.html" class="auth-logo-link" style="display:flex;flex-direction:row;align-items:center;gap:12px;text-decoration:none;">
        <div class="auth-logo-icon" style="background:linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);flex-shrink:0;">
          <i class="fas fa-shield-halved" style="color:#fff;"></i>
        </div>
        <span class="brand-name" style="font-size:1.5rem;font-weight:800;color:var(--text-heading);transition:color 0.3s ease;">EpoxyPro</span>
      </a>
    </div>

    <h1 class="auth-title" style="font-weight:600;">Welcome Back</h1>
    <p class="auth-subtitle" style="font-weight:450;">Sign in to access your account and project dashboard.</p>

    <form data-validate id="loginForm">
      <!-- Email Field -->
      <div class="form-group-custom">
        <label class="form-label-custom" for="login-email">Email Address *</label>
        <div class="form-input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" id="login-email" class="form-control-custom" placeholder="your@email.com" required />
          <div class="form-error-msg">Valid email required.</div>
        </div>
      </div>

      <!-- Password Field with Toggle -->
      <div class="form-group-custom">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <label class="form-label-custom" style="margin:0;" for="login-pwd">Password *</label>
          <a href="#" style="font-size:0.8rem;color:var(--secondary);font-weight:600;text-decoration:none;transition:color 0.2s;">Forgot Password?</a>
        </div>
        <div class="form-input-icon" style="position:relative;">
          <i class="fas fa-lock"></i>
          <input type="password" id="login-pwd" class="form-control-custom" placeholder="Your password" required />
          <button type="button" class="toggle-password" data-target="#login-pwd" aria-label="Toggle Password Visibility">
            <i class="fas fa-eye-slash"></i>
          </button>
          <div class="form-error-msg">Password required.</div>
        </div>
      </div>

      <!-- Remember Me Checkbox -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;">
        <input type="checkbox" id="remember-me" style="width:16px;height:16px;accent-color:var(--primary);cursor:pointer;" />
        <label for="remember-me" style="font-size:0.85rem;color:var(--text-secondary);cursor:pointer;user-select:none;">Remember me for 30 days</label>
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn-primary-custom w-100 justify-content-center" style="font-weight:700;">
        <i class="fas fa-sign-in-alt me-2"></i> Sign In
      </button>
    </form>

    <!-- Divider -->
    <div class="auth-divider">or sign in with</div>

    <!-- Social Login Icons -->
    <div class="social-auth-row">
      <button class="social-icon-btn" type="button" aria-label="Sign in with Google">
        <i class="fab fa-google"></i>
      </button>
      <button class="social-icon-btn" type="button" aria-label="Sign in with Facebook">
        <i class="fab fa-facebook-f"></i>
      </button>
      <button class="social-icon-btn" type="button" aria-label="Sign in with Apple">
        <i class="fab fa-apple"></i>
      </button>
    </div>

    <!-- Signup Redirect Link -->
    <p style="text-align:center;font-size:0.85rem;color:var(--text-secondary);margin-top:28px;margin-bottom:0;">
      Don't have an account? <a href="register.html" style="color:var(--secondary);font-weight:700;text-decoration:none;">Create one free</a>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Standalone theme + RTL toggle for auth pages
  (function() {
    // Apply saved theme on load
    const savedTheme = localStorage.getItem('epoxy-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    function updateIcon(theme) {
      document.querySelectorAll('.theme-icon').forEach(ic => {
        ic.className = 'theme-icon fas ' + (theme === 'dark' ? 'fa-sun' : 'fa-moon');
      });
    }
    updateIcon(savedTheme);

    // Apply saved RTL dir on load
    const savedDir = localStorage.getItem('epoxy-dir') || 'ltr';
    document.documentElement.setAttribute('dir', savedDir);

    document.addEventListener('DOMContentLoaded', function() {
      // Theme toggle
      document.querySelectorAll('.theme-toggle').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const current = document.documentElement.getAttribute('data-theme');
          const next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('epoxy-theme', next);
          updateIcon(next);
        });
      });

      // RTL toggle
      document.querySelectorAll('.rtl-toggle').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const current = document.documentElement.getAttribute('dir') || 'ltr';
          const next = current === 'rtl' ? 'ltr' : 'rtl';
          document.documentElement.setAttribute('dir', next);
          localStorage.setItem('epoxy-dir', next);
        });
      });

      // Form validation
      document.querySelectorAll('[data-validate]').forEach(function(form) {
        form.addEventListener('submit', function(e) {
          if (!form.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
          }
          form.classList.add('was-validated');
        });
      });
    });
  })();
</script>
</body>
</html>
