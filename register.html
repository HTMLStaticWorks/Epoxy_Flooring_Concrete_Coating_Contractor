<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | EpoxyPro Contractors</title>
  <meta name="description" content="Create your free EpoxyPro account to get quotes, track projects, and access exclusive resources." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css?v=2.1" />
  <script>
    // Apply saved theme and direction immediately to prevent flash of unstyled content
    document.documentElement.setAttribute('data-theme', localStorage.getItem('epoxy-theme') || 'dark');
    document.documentElement.setAttribute('dir', localStorage.getItem('epoxy-dir') || 'ltr');
  </script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>

<!-- Floating Theme & RTL Controls (Top Right Corner, Outside Card) -->
<div class="auth-controls" style="position:fixed;top:24px;right:24px;z-index:1001;display:flex;gap:10px;">
  <button class="header-icon-btn rtl-toggle" title="RTL Toggle" aria-label="Toggle RTL" style="color:#fff;">
    <i class="fas fa-align-right"></i>
  </button>
  <button class="header-icon-btn theme-toggle" title="Theme Toggle" aria-label="Toggle Theme" style="color:#fff;">
    <i class="theme-icon fas fa-moon"></i>
  </button>
</div>

<div class="auth-page">
  <div class="auth-card" data-aos="zoom-in">
    
    <!-- Centered Card Header (Logo + Brand Name) -->
    <div class="auth-header-wrap" style="display:flex;flex-direction:row;align-items:center;justify-content:center;gap:14px;margin-bottom:28px;">
      <a href="index.html" class="auth-logo-link" style="display:flex;flex-direction:row;align-items:center;gap:12px;text-decoration:none;">
        <div class="auth-logo-icon" style="flex-shrink:0;">
          <i class="fas fa-layer-group" style="color:#fff;"></i>
        </div>
        <span class="brand-name" style="font-size:1.5rem;font-weight:800;color:var(--text-heading);transition:color 0.3s ease;">EpoxyPro</span>
      </a>
    </div>

    <h1 class="auth-title" style="font-weight:600;">Create Account</h1>
    <p class="auth-subtitle" style="font-weight:450;">Join thousands of property owners and facility managers.</p>

    <form data-validate id="registerForm">
      <!-- Full Name Field -->
      <div class="form-group-custom">
        <label class="form-label-custom" for="reg-fullname">Full Name *</label>
        <div class="form-input-icon">
          <i class="fas fa-user"></i>
          <input type="text" id="reg-fullname" class="form-control-custom" placeholder="John Smith" required />
          <div class="form-error-msg">Full name required.</div>
        </div>
      </div>

      <!-- Email Field -->
      <div class="form-group-custom">
        <label class="form-label-custom" for="reg-email">Email Address *</label>
        <div class="form-input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" id="reg-email" class="form-control-custom" placeholder="your@email.com" required />
          <div class="form-error-msg">Valid email required.</div>
        </div>
      </div>

      <!-- Password Field with Toggle -->
      <div class="form-group-custom">
        <label class="form-label-custom" for="reg-pwd">Password *</label>
        <div class="form-input-icon" style="position:relative;">
          <i class="fas fa-lock"></i>
          <input type="password" id="reg-pwd" class="form-control-custom" placeholder="Min. 8 characters" required />
          <button type="button" class="toggle-password" data-target="#reg-pwd" aria-label="Toggle Password Visibility">
            <i class="fas fa-eye-slash"></i>
          </button>
          <div class="form-error-msg">Password required.</div>
        </div>
      </div>

      <!-- Confirm Password Field with Toggle -->
      <div class="form-group-custom">
        <label class="form-label-custom" for="reg-confirm">Confirm Password *</label>
        <div class="form-input-icon" style="position:relative;">
          <i class="fas fa-lock"></i>
          <input type="password" id="reg-confirm" class="form-control-custom" placeholder="Repeat your password" required />
          <button type="button" class="toggle-password" data-target="#reg-confirm" aria-label="Toggle Password Visibility">
            <i class="fas fa-eye-slash"></i>
          </button>
          <div class="form-error-msg">Please confirm your password.</div>
        </div>
      </div>

      <!-- Password Strength -->
      <div style="margin-bottom:20px;">
        <div style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:8px;font-weight:500;">Password strength</div>
        <div style="height:4px;background:var(--border-color);border-radius:2px;overflow:hidden;">
          <div id="pwdStrength" style="height:100%;width:0%;background:var(--gradient-secondary);border-radius:2px;transition:width 0.4s;"></div>
        </div>
      </div>

      <!-- Terms & Signup Button -->
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:24px;">
        <input type="checkbox" id="terms" style="width:16px;height:16px;accent-color:var(--primary);margin-top:2px;flex-shrink:0;" required />
        <label for="terms" style="font-size:0.82rem;color:var(--text-secondary);cursor:pointer;line-height:1.5;user-select:none;">
          I agree to the <a href="#" style="color:var(--secondary);font-weight:600;text-decoration:none;">Terms of Service</a> and <a href="#" style="color:var(--secondary);font-weight:600;text-decoration:none;">Privacy Policy</a>.
        </label>
      </div>

      <button type="submit" class="btn-primary-custom w-100 justify-content-center" style="font-weight:700;">
        <i class="fas fa-user-plus me-2"></i> Create Account
      </button>
    </form>

    <!-- Divider -->
    <div class="auth-divider">or sign up with</div>

    <!-- Social Signup Icons -->
    <div class="social-auth-row">
      <button class="social-icon-btn" type="button" aria-label="Sign up with Google">
        <i class="fab fa-google"></i>
      </button>
      <button class="social-icon-btn" type="button" aria-label="Sign up with Facebook">
        <i class="fab fa-facebook-f"></i>
      </button>
      <button class="social-icon-btn" type="button" aria-label="Sign up with Apple">
        <i class="fab fa-apple"></i>
      </button>
    </div>

    <!-- Login Redirect Link -->
    <p style="text-align:center;font-size:0.85rem;color:var(--text-secondary);margin-top:28px;margin-bottom:0;">
      Already have an account? <a href="login.html" style="color:var(--secondary);font-weight:700;text-decoration:none;">Sign in</a>
    </p>

  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Password strength meter
      const pwdInput = document.getElementById('reg-pwd');
      const bar = document.getElementById('pwdStrength');
      if (pwdInput && bar) {
        pwdInput.addEventListener('input', () => {
          const v = pwdInput.value;
          let strength = 0;
          if (v.length >= 8) strength += 25;
          if (/[A-Z]/.test(v)) strength += 25;
          if (/[0-9]/.test(v)) strength += 25;
          if (/[^A-Za-z0-9]/.test(v)) strength += 25;
          bar.style.width = strength + '%';
          bar.style.background = strength < 50 ? '#EF4444' : strength < 75 ? '#F59E0B' : '#10B981';
        });
      }
    });
  </script>
</body>
</html>
