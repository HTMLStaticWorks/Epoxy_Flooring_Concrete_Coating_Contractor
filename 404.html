<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | EpoxyPro Contractors</title>
  <meta name="description" content="Oops! The page you're looking for doesn't exist. Return to EpoxyPro's homepage to explore our epoxy flooring services." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>

<!-- Theme toggle -->
<div style="position:fixed;top:20px;right:20px;z-index:1001;display:flex;gap:8px;">
  <button class="header-icon-btn theme-toggle" style="background:rgba(27,58,107,0.7);border-color:rgba(255,255,255,0.2);color:#fff;" title="Theme"><i class="theme-icon fas fa-moon"></i></button>
</div>

<div class="error-page">
  <!-- Decorative orbs -->
  <div style="position:absolute;top:-10%;right:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,0.08),transparent 70%);pointer-events:none;"></div>
  <div style="position:absolute;bottom:-10%;left:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(42,82,152,0.15),transparent 70%);pointer-events:none;"></div>

  <div class="text-center position-relative" style="z-index:1;max-width:600px;padding:40px 20px;" data-aos="zoom-in">
    <!-- Big 404 -->
    <span class="error-code">404</span>

    <!-- Icon -->
    <div style="width:80px;height:80px;background:rgba(249,115,22,0.12);border:1px solid rgba(249,115,22,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;animation:float 3s ease-in-out infinite;">
      <i class="fas fa-search" style="font-size:1.8rem;color:var(--secondary);"></i>
    </div>

    <h1 style="font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;color:#fff;margin-bottom:16px;">
      Oops! Page Not Found
    </h1>
    <p style="color:rgba(255,255,255,0.65);font-size:1rem;line-height:1.8;margin-bottom:36px;">
      The page you're looking for seems to have been coated over or moved to a different location. Let's get you back on solid ground.
    </p>

    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <a href="index.html" class="btn-primary-custom">
        <i class="fas fa-home"></i> Go to Homepage
      </a>
      <a href="contact.html" class="btn-outline-custom">
        <i class="fas fa-envelope"></i> Contact Us
      </a>
    </div>

    <!-- Quick Links -->
    <div style="margin-top:48px;padding-top:36px;border-top:1px solid rgba(255,255,255,0.08);">
      <p style="color:rgba(255,255,255,0.5);font-size:0.82rem;margin-bottom:16px;font-weight:600;letter-spacing:1px;text-transform:uppercase;">Quick Links</p>
      <div class="d-flex gap-3 justify-content-center flex-wrap">
        <a href="services.html" style="color:rgba(255,255,255,0.65);font-size:0.85rem;padding:8px 16px;background:rgba(255,255,255,0.05);border-radius:8px;border:1px solid rgba(255,255,255,0.1);transition:var(--transition);" onmouseenter="this.style.color='var(--secondary)';this.style.borderColor='var(--secondary)'" onmouseleave="this.style.color='rgba(255,255,255,0.65)';this.style.borderColor='rgba(255,255,255,0.1)'">Services</a>
        <a href="gallery.html" style="color:rgba(255,255,255,0.65);font-size:0.85rem;padding:8px 16px;background:rgba(255,255,255,0.05);border-radius:8px;border:1px solid rgba(255,255,255,0.1);transition:var(--transition);" onmouseenter="this.style.color='var(--secondary)';this.style.borderColor='var(--secondary)'" onmouseleave="this.style.color='rgba(255,255,255,0.65)';this.style.borderColor='rgba(255,255,255,0.1)'">Gallery</a>
        <a href="pricing.html" style="color:rgba(255,255,255,0.65);font-size:0.85rem;padding:8px 16px;background:rgba(255,255,255,0.05);border-radius:8px;border:1px solid rgba(255,255,255,0.1);transition:var(--transition);" onmouseenter="this.style.color='var(--secondary)';this.style.borderColor='var(--secondary)'" onmouseleave="this.style.color='rgba(255,255,255,0.65)';this.style.borderColor='rgba(255,255,255,0.1)'">Pricing</a>
        <a href="booking.html" style="color:rgba(255,255,255,0.65);font-size:0.85rem;padding:8px 16px;background:rgba(255,255,255,0.05);border-radius:8px;border:1px solid rgba(255,255,255,0.1);transition:var(--transition);" onmouseenter="this.style.color='var(--secondary)';this.style.borderColor='var(--secondary)'" onmouseleave="this.style.color='rgba(255,255,255,0.65)';this.style.borderColor='rgba(255,255,255,0.1)'">Book Now</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
